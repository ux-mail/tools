<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2FA Authenticator Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #000000; --card: #121212; --border: #333; --text: #ffffff; --gray: #888; --danger: #ef4444; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .wrapper { width: 100%; max-width: 480px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .card-form { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 25px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border); border-radius: 8px; background: #1a1a1a; color: #fff; font-size: 14px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 14px; background: #fff; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; }
        .top-bar { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 15px; gap: 10px; }
        .btn-clear { color: var(--danger); background: none; border: 1px solid var(--danger); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; }
        .btn-del-selected { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; display: none; }
        
        .acc-item { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; display: flex; gap: 12px; }
        .content-area { flex-grow: 1; }
        
        /* Nama Akun & Copy Mail */
        .acc-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 10px; }
        .acc-name { font-size: 15px; font-weight: 600; color: #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-mail { background: #222; border: 1px solid #444; color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 9px; cursor: pointer; font-weight: bold; text-transform: uppercase; white-space: nowrap; }

        .secret-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .secret-val { font-family: monospace; background: #222; padding: 4px 8px; border-radius: 4px; font-size: 10px; color: #aaa; word-break: break-all; flex-grow: 1; }
        .btn-small-copy { background: #333; border: 1px solid #444; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        
        .otp-box { display: flex; align-items: center; justify-content: space-between; background: #0a0a0a; padding: 12px 16px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #1a1a1a; }
        .otp-num { font-family: monospace; font-size: 32px; font-weight: 700; color: var(--primary); letter-spacing: 2px; }
        .btn-copy-main { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700; text-transform: uppercase; }
        
        .item-footer { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--gray); margin-top: 10px; }
        .btn-link { background: none; border: none; color: var(--primary); font-size: 12px; cursor: pointer; text-decoration: underline; padding: 0; }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header"><h3>2FA Authenticator</h3></div>
    <div class="top-bar" id="topBar" style="display:none">
        <button id="btnDelSelected" class="btn-del-selected" onclick="deleteSelected()">Delete Selected (<span id="count">0</span>)</button>
        <button class="btn-clear" onclick="clearAll()">Clear All</button>
    </div>
    <div class="card-form">
        <input type="text" id="accName" placeholder="Account Name (e.g. Email)" autocomplete="off">
        <input type="text" id="accKey" placeholder="Secret Key" autocomplete="off">
        <textarea id="accBackup" placeholder="Backup Codes / Notes" rows="2"></textarea>
        <button class="btn-save" onclick="saveAccount()">Save Account</button>
    </div>
    <div id="displayList"></div>
</div>
<script>
    let accounts = JSON.parse(localStorage.getItem('ux_mail_v1') || '[]');

    function saveAccount() {
        const name = document.getElementById('accName').value.trim();
        const keyRaw = document.getElementById('accKey').value.replace(/\s/g, '').toUpperCase();
        const backup = document.getElementById('accBackup').value;
        if (name && keyRaw) {
            accounts.push({ name, key: keyRaw, backup });
            localStorage.setItem('ux_mail_v1', JSON.stringify(accounts));
            location.reload();
        }
    }

    // Fungsi untuk menambah spasi setiap 4 karakter
    function formatKeyWithSpaces(str) {
        return str.match(/.{1,4}/g).join(' ');
    }

    function updateUI() {
        const selected = document.querySelectorAll('.acc-check:checked').length;
        document.getElementById('count').innerText = selected;
        document.getElementById('btnDelSelected').style.display = selected > 0 ? 'inline-block' : 'none';
    }

    function deleteSelected() {
        if(confirm("Delete selected accounts?")) {
            const checks = Array.from(document.querySelectorAll('.acc-check')).reverse();
            accounts = accounts.filter((_, i) => !checks[i].checked);
            localStorage.setItem('ux_mail_v1', JSON.stringify(accounts));
            location.reload();
        }
    }

    function clearAll() {
        if(confirm("Wipe all data?")) {
            localStorage.removeItem('ux_mail_v1');
            location.reload();
        }
    }

    function render() {
        const div = document.getElementById('displayList');
        if (accounts.length > 0) document.getElementById('topBar').style.display = 'flex';
        div.innerHTML = '';
        [...accounts].reverse().forEach((acc, i) => {
            const originalIndex = accounts.length - 1 - i;
            const formattedKey = formatKeyWithSpaces(acc.key);
            div.innerHTML += `
                <div class="acc-item">
                    <div style="padding-top:4px"><input type="checkbox" class="acc-check" onclick="updateUI()"></div>
                    <div class="content-area">
                        <div class="acc-header">
                            <span class="acc-name" id="mail-${originalIndex}">${acc.name}</span>
                            <button class="btn-mail" onclick="copyRaw('mail-${originalIndex}')">Copy Mail</button>
                        </div>
                        <div class="secret-row">
                            <code class="secret-val" id="key-${originalIndex}">${formattedKey}</code>
                            <button class="btn-small-copy" onclick="copyRaw('key-${originalIndex}')">Copy Key</button>
                        </div>
                        <div class="otp-box">
                            <div class="otp-num" id="otp-${originalIndex}">------</div>
                            <button class="btn-copy-main" id="btn-otp-${originalIndex}" onclick="copyRaw('otp-${originalIndex}', true)">COPY</button>
                        </div>
                        <div class="item-footer">
                            <span id="timer-${originalIndex}">30s</span>
                            <div>
                                <button class="btn-link" onclick="toggleEdit(${originalIndex})">Notes</button>
                                <button class="btn-link" style="color:var(--danger);margin-left:12px" onclick="deleteSingle(${originalIndex})">Delete</button>
                            </div>
                        </div>
                        <div id="ed-${originalIndex}" style="display:none;margin-top:10px">
                            <textarea oninput="saveBackup(${originalIndex}, this.value)" style="background:#1a1a1a; color:#fff; border:1px solid #333; width:100%; border-radius:5px;">${acc.backup || ''}</textarea>
                        </div>
                    </div>
                </div>`;
        });
    }

    function updateCodes() {
        accounts.forEach((acc, i) => {
            try {
                let totp = new OTPAuth.TOTP({ secret: acc.key });
                document.getElementById('otp-' + i).innerText = totp.generate();
                document.getElementById('timer-' + i).innerText = (30 - (Math.floor(Date.now() / 1000) % 30)) + "s";
            } catch (e) { if(document.getElementById('otp-' + i)) document.getElementById('otp-' + i).innerText = "ERR"; }
        });
    }

    function copyRaw(id, isMain = false) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text);
        const btn = isMain ? document.getElementById('btn-otp-' + id.split('-')[1]) : event.target;
        const oldText = btn.innerText;
        btn.innerText = 'DONE!';
        setTimeout(() => btn.innerText = oldText, 800);
    }

    function toggleEdit(i) {
        const e = document.getElementById('ed-' + i);
        e.style.display = e.style.display === 'none' ? 'block' : 'none';
    }

    function saveBackup(i, val) {
        accounts[i].backup = val;
        localStorage.setItem('ux_mail_v1', JSON.stringify(accounts));
    }

    function deleteSingle(i) {
        if(confirm("Hapus akun ini?")) {
            accounts.splice(i, 1);
            localStorage.setItem('ux_mail_v1', JSON.stringify(accounts));
            location.reload();
        }
    }

    render();
    setInterval(updateCodes, 1000);
    updateCodes();
</script>
</body>
</html>
